<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Yardage Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .table-wrapper {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th {
            padding: 14px 8px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #bdc3c7;
        }

        tbody tr {
            border-bottom: 1px solid #ecf0f1;
        }

        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        td {
            padding: 12px 8px;
        }

        .club-cell {
            font-weight: bold;
            color: #2c3e50;
            min-width: 100px;
        }

        .input-cell {
            text-align: center;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px 4px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 4px rgba(52, 152, 219, 0.3);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
        }

        .footer-text {
            color: #7f8c8d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛳ Golf Yardage Tracker</h1>
            <div class="button-group">
                <button class="btn-primary" onclick="exportData()">📋 Copy All</button>
                <button class="btn-danger" onclick="resetData()">🔄 Reset</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="golfTable">
                <thead>
                    <tr>
                        <th>Club</th>
                        <th>−</th>
                        <th>Avg</th>
                        <th>+</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p class="footer-text">📱 Data saves automatically • Works completely offline</p>
        </div>
    </div>

    <script>
        const clubs = [
            'Driver',
            '5 Wood',
            '4 Hybrid',
            '5 Iron',
            '6 Iron',
            '7 Iron',
            '8 Iron',
            '9 Iron',
            'U',
            'W',
            '54°',
            '58°',
            '60°'
        ];

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('golfYardages');
            if (saved) {
                return JSON.parse(saved);
            }
            // Create empty object for all clubs
            const initial = {};
            clubs.forEach(club => {
                initial[club] = { short: '', avg: '', long: '' };
            });
            return initial;
        }

        // Save data to localStorage
        function saveData(data) {
            localStorage.setItem('golfYardages', JSON.stringify(data));
        }

        // Initialize the table
        function initTable() {
            const data = loadData();
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            clubs.forEach((club, index) => {
                const row = document.createElement('tr');
                const shortYards = data[club]?.short || '';
                const avgYards = data[club]?.avg || '';
                const longYards = data[club]?.long || '';

                row.innerHTML = `
                    <td class="club-cell">${club}</td>
                    <td class="input-cell">
                        <input type="number" class="short" data-club="${club}" placeholder="−" value="${shortYards}">
                    </td>
                    <td class="input-cell">
                        <input type="number" class="avg" data-club="${club}" placeholder="Avg" value="${avgYards}">
                    </td>
                    <td class="input-cell">
                        <input type="number" class="long" data-club="${club}" placeholder="+" value="${longYards}">
                    </td>
                `;
                tableBody.appendChild(row);
            });

            // Add event listeners to all inputs
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('change', handleInputChange);
                input.addEventListener('blur', handleInputChange);
            });
        }

        // Handle input changes
        function handleInputChange(e) {
            const club = e.target.dataset.club;
            const type = e.target.classList[0]; // 'short', 'avg', or 'long'
            const value = e.target.value;

            const data = loadData();
            data[club][type] = value;
            saveData(data);
        }

        // Export data as text
        function exportData() {
            const data = loadData();
            let text = 'Golf Yardages:\n\n';
            
            clubs.forEach(club => {
                const short = data[club].short || '—';
                const avg = data[club].avg || '—';
                const long = data[club].long || '—';
                text += `${club.padEnd(12)} Short: ${short.padStart(3)}  Avg: ${avg.padStart(3)}  Long: ${long.padStart(3)}\n`;
            });

            // Copy to clipboard
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                alert('Copy manually:\n\n' + text);
            });
        }

        // Reset all data
        function resetData() {
            if (confirm('Reset all yardages? This cannot be undone.')) {
                const initial = {};
                clubs.forEach(club => {
                    initial[club] = { short: '', avg: '', long: '' };
                });
                saveData(initial);
                initTable();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initTable);
    </script>
</body>
</html>
